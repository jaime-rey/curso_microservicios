server:
  port: 8080
spring:
  application:
    name: "accounts"
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

build:
  version: "3.0"

accounts:
  message: "Welcome to Banca Rey accounts related local APIs"
  contactDetails:
    nme: "Jaime Rey - Developer"
    email: "jaime@bancarey.com"
  onCallSupport:
    - (555) 555-1234
    - (555) 523-1345